<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Виселица</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: blue; padding: 20px; }
        .game-card { background: white; border-radius: 20px; padding: 20px; max-width: 800px; margin: 0 auto; }
        pre { background: #f0f0f0; padding: 15px; border-radius: 10px; font-size: 12px; }
        .letter-box { width: 55px; height: 65px; border: 2px solid blue; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin: 3px; background: white; }
        .letter-box.found { background: lightgreen; border-color: green; }
        .key-btn { width: 45px; margin: 3px; }
        .key-btn.correct { background: green; color: white; }
        .key-btn.wrong { background: red; color: white; }
        .win { background: lightgreen; color: darkgreen; }
        .lose { background: lightcoral; color: darkred; }
        .info { background: lightblue; color: darkblue; }
    </style>
</head>
<body>
<div class="game-card">
    <h1 class="text-center" style="color: blue;">ВИСЕЛИЦА</h1>
    
    <div class="row">
        <div class="col-md-5">
            <pre id="hangmanPic" class="text-center"></pre>
        </div>
        <div class="col-md-7">
            <div class="bg-dark text-white p-3 rounded d-flex justify-content-around mb-3">
                <div>❌ Ошибки: <span id="errors">0</span></div>
                <div>💪 Осталось: <span id="left">6</span></div>
                <div>⭐ Счёт: <span id="score">0</span></div>
            </div>
        </div>
    </div>
    
    <div id="wordArea" class="text-center my-4"></div>
    <div id="message" class="text-center p-2 rounded mb-3 info">Нажмите "Новая игра"</div>
    <div id="keyboardArea" class="text-center mb-4"></div>
    <div class="text-center"><button id="newGameBtn" class="btn" style="background: blue; color: white;">🔄 Новая игра</button></div>
</div>

<script>
    const words = ['КОМПЬЮТЕР', 'КЛАВИАТУРА', 'ПРОЦЕССОР', 'МОНИТОР', 'ПРОГРАММИСТ', 'АЛГОРИТМ', 'МАССИВ', 'ФУНКЦИЯ', 'ЦИКЛ'];
    const hangman = [
        "  +---+\n      |\n      |\n      |\n      |\n      |\n=====",
        "  +---+\n  |   |\n      |\n      |\n      |\n      |\n=====",
        "  +---+\n  |   |\n  O   |\n      |\n      |\n      |\n=====",
        "  +---+\n  |   |\n  O   |\n  |   |\n      |\n      |\n=====",
        "  +---+\n  |   |\n  O   |\n /|   |\n      |\n      |\n=====",
        "  +---+\n  |   |\n  O   |\n /|\\  |\n      |\n      |\n=====",
        "  +---+\n  |   |\n  O   |\n /|\\  |\n / \\  |\n      |\n====="
    ];
    
    // ПЕРЕМЕННЫЕ
    let currentWord = '', userWord = [], wrong = 0, usedLetters = new Set(), gameRunning = true, totalScore = 0;
    
    // DOM ЭЛЕМЕНТЫ
    const hangmanPic = document.getElementById('hangmanPic');
    const errorsSpan = document.getElementById('errors');
    const leftSpan = document.getElementById('left');
    const scoreSpan = document.getElementById('score');
    const wordArea = document.getElementById('wordArea');
    const messageDiv = document.getElementById('message');
    const keyboardArea = document.getElementById('keyboardArea');
    const newGameBtn = document.getElementById('newGameBtn');
    
    function setMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = 'text-center p-2 rounded mb-3 ' + type;
    }
    
    // ОБНОВИТЬ ВСЁ
    function updateUI() {
        hangmanPic.textContent = hangman[wrong];
        errorsSpan.textContent = wrong;
        leftSpan.textContent = 6 - wrong;
        scoreSpan.textContent = totalScore;
        
        wordArea.innerHTML = '';
        for (let i = 0; i < userWord.length; i++) {
            let box = document.createElement('div');
            box.className = 'letter-box';
            if (userWord[i] !== '_') {
                box.textContent = userWord[i];
                box.classList.add('found');
            } else {
                box.textContent = '?';
            }
            wordArea.appendChild(box);
        }
    }
    
    function checkEnd() {
        if (userWord.join('') === currentWord) {
            gameRunning = false;
            let points = 6 - wrong;
            totalScore += points;
            setMessage('ПОБЕДА! +' + points + ' очков', 'win');
            updateUI();
            document.querySelectorAll('.key-btn').forEach(btn => btn.disabled = true);
            return true;
        }
        if (wrong >= 6) {
            gameRunning = false;
            setMessage('ПРОИГРЫШ! Слово: ' + currentWord, 'lose');
            for (let i = 0; i < currentWord.length; i++) userWord[i] = currentWord[i];
            updateUI();
            document.querySelectorAll('.key-btn').forEach(btn => btn.disabled = true);
            return true;
        }
        return false;
    }
    
    function guessLetter(letter, btn) {
        if (!gameRunning) return;
        if (usedLetters.has(letter)) return;
        
        usedLetters.add(letter);
        let found = false;
        
        for (let i = 0; i < currentWord.length; i++) {
            if (currentWord[i] === letter) {
                userWord[i] = letter;
                found = true;
            }
        }
        
        if (found) {
            btn.classList.add('correct');
            setMessage('Буква ' + letter + ' есть!', 'info');
        } 
        else {
            wrong++;
            btn.classList.add('wrong');
            setMessage('Буквы ' + letter + ' нет!', 'info');
        }
        
        btn.disabled = true;
        updateUI();
        checkEnd();
    }

    function createKeyboard() {
        keyboardArea.innerHTML = '';
        const alphabet = ['А','Б','В','Г','Д','Е','Ё','Ж','З','И','Й','К','Л','М','Н','О','П','Р','С','Т','У','Ф','Х','Ц','Ч','Ш','Щ','Ъ','Ы','Ь','Э','Ю','Я'];
        
        for (let letter of alphabet) {
            let btn = document.createElement('button');
            btn.textContent = letter;
            btn.className = 'key-btn btn btn-outline-primary';
            btn.onclick = () => guessLetter(letter, btn);
            keyboardArea.appendChild(btn);
        }
    }

    function newGame() {
        currentWord = words[Math.floor(Math.random() * words.length)];
        userWord = [];
        for (let i = 0; i < currentWord.length; i++) userWord[i] = '_';
        
        wrong = 0;
        usedLetters.clear();
        gameRunning = true;
        
        setMessage('Угадайте слово из ' + currentWord.length + ' букв', 'info');
        updateUI();
        
        // СБРОС КЛАВИАТУРЫ
        document.querySelectorAll('.key-btn').forEach(btn => {
            btn.disabled = false;
            btn.classList.remove('correct', 'wrong');
            btn.className = 'key-btn btn btn-outline-primary';
        });
    }
    
    createKeyboard();
    newGameBtn.onclick = newGame;
    newGame();
</script>
</body>
</html>
