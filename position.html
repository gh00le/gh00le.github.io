<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Отслеживание позиции мыши</title>
    <style>
        .track-area {
            width: 500px;
            height: 300px;
            background-color: lightblue;
            border: 2px solid blue;
            border-radius: 10px;
            margin: 50px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: background-color 0.3s;
        }
        .track-area.active {
            background-color: red;
        }
        .output {
            text-align: center;
            font-size: 20px;
            margin-top: 20px;
            padding: 10px;
            background-color: lightgray;
            border-radius: 10px;
            font-family: monospace;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            color: blue;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Отслеживание позиции мыши</h1>
    
    <div id="trackArea" class="track-area">
        Наведи мышь на эту область
    </div>
    <div id="output" class="output">
        Координаты: (0, 0)
    </div>
</div>

<script>
    const trackArea = document.getElementById('trackArea');
    const outputDiv = document.getElementById('output');
    
    trackArea.addEventListener('mouseover', function() {
        trackArea.classList.add('active');
    });

    trackArea.addEventListener('mouseout', function() {
        trackArea.classList.remove('active');
        outputDiv.textContent = 'Мышь покинула область';
    });
    
    // СОБЫТИЕ mousemove - КОГДА МЫШЬ ДВИГАЕТСЯ ВНУТРИ ОБЛАСТИ
    trackArea.addEventListener('mousemove', function(event) {
        const x = event.clientX;
        const y = event.clientY;
        outputDiv.textContent = 'Координаты мыши: X = ' + x + ', Y = ' + y;
    });
</script>

</body>
</html>
